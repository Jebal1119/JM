name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t my-html-app .

    - name: Run Container
      run: docker run -d --name test-container my-html-app

    - name: Wait for container
      run: sleep 5

    - name: Test Application (inside container)
      run: docker exec test-container curl http://localhost

    - name: Deploy Step
      run: echo "Deployment successful"